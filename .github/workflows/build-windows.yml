name: Build Windows App (.exe & .msi)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Build Deno Windows Sidecar
        run: npm run build:deno:win

      - name: Build Tauri Desktop App
        run: npx tauri build

      - name: Upload NSIS Installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: VelocityDL-v0.5.0-Windows-EXE
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI Installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: VelocityDL-v0.5.0-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
