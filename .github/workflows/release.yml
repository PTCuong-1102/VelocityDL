name: 'publish'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: install node dependencies
        run: npm ci

      - name: build Deno sidecar (linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: npm run build:deno:linux

      - name: build Deno sidecar (windows)
        if: matrix.platform == 'windows-latest'
        run: npm run build:deno:win

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'VelocityDL v__VERSION__'
          releaseBody: 'VelocityDL desktop release for Windows and Linux.'
          releaseDraft: false
          prerelease: false
